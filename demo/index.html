<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../images/videl-logo.svg" />
  <title>Videl Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #333;
      --text:    #e8e8e8;
      --muted:   #888;
      --accent:  #4f9cf9;
      --danger:  #e05252;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }
    header .subtitle { color: var(--muted); font-size: 12px; }
    header .spacer { flex: 1; }
    header .gh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 15px 22px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      text-decoration: none;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    header .gh-btn:hover { background: #2a2a2a; border-color: var(--accent); }
    header .gh-btn svg  { flex-shrink: 0; }

    /* ── Main two-column layout ──────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 500px;
      overflow: hidden;
    }

    /* ── Player column ───────────────────────────────────────────── */
    .player-col {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    media-controller {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    videl-player {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Event log column ────────────────────────────────────────── */
    .log-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-header h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .log-controls { display: flex; gap: 6px; }

    button {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: background .15s, border-color .15s;
    }
    button:hover   { background: var(--surface); border-color: var(--accent); }
    button.active  { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.danger  { border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger); color: #fff; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .log-entry {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 4px 8px;
      padding: 4px 12px;
      border-bottom: 1px solid #1f1f1f;
      line-height: 1.4;
      font-size: 11px;
    }
    .log-entry:hover { background: var(--surface); }

    .log-ts    { color: var(--muted); white-space: nowrap; }
    .log-body  { display: flex; flex-direction: column; gap: 1px; }
    .log-event { font-weight: 600; }
    .log-event.videl-done             { color: #6bbf6b; }
    .log-event.videl-seg-error,
    .log-event.videl-mse-error        { color: var(--danger); }
    .log-event.videl-repr-switched    { color: #f9c84f; }
    .log-event.videl-mse-incompatible { color: #f9844f; }
    .log-event.media-event            { color: var(--accent); }
    .log-event.trace-event            { color: #666; font-weight: normal; font-style: italic; }
    .log-source { color: var(--muted); font-size: 10px; }
    .log-detail { color: #aaa; font-size: 10px; word-break: break-all; }

    .log-trace-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .log-trace-toggle input { accent-color: var(--accent); cursor: pointer; }

    /* ── URL bar (footer) ────────────────────────────────────────── */
    footer {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      align-items: center;
    }

    #url-select {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    #url-input {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    #url-input:focus { border-color: var(--accent); }

    #load-btn {
      padding: 5px 16px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    #load-btn:hover { background: #6baaff; }

    /* ── Responsive: single column below 768px ───────────────────── */
    @media (max-width: 767px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow-y: auto;
      }
      .player-col  { border-right: none; border-bottom: 1px solid var(--border); }
      .log-col     { min-height: 240px; }
      footer       { flex-wrap: wrap; }
      #url-select  { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <img src="../images/videl-logo.svg" height="100px" alt="Videl logo" />
  <h1>Videl:</h1>
  <span class="subtitle">DASH adaptive streaming via Web Component abuse</span>
  <span class="spacer"></span>
  <a class="gh-btn" href="https://github.com/imbcmdth/videl" target="_blank" rel="noopener noreferrer"
     aria-label="View on GitHub">
    <!-- GitHub mark SVG (MIT-licensed, github.com/logos) -->
    <svg height="16" viewBox="0 0 16 16" width="16" aria-hidden="true" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
               -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
               .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
               .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
               0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
               c0-4.42-3.58-8-8-8z"/>
    </svg>
    GitHub
  </a>
</header>

<main>
  <div class="player-col">
    <media-controller id="mc">
      <videl-player id="player" slot="media"></videl-player>
      <media-control-bar>
        <media-play-button></media-play-button>
        <media-time-range></media-time-range>
        <media-time-display show-duration></media-time-display>
        <media-mute-button></media-mute-button>
        <media-volume-range></media-volume-range>
        <media-fullscreen-button></media-fullscreen-button>
      </media-control-bar>
    </media-controller>
  </div>

  <div class="log-col">
    <div class="log-header">
      <h2>Event Log</h2>
      <div class="log-controls">
        <label class="log-trace-toggle" title="videl:trace events are hidden by default">
          <input type="checkbox" id="trace-toggle" />
          trace
        </label>
        <button id="pause-btn">Pause</button>
        <button id="clear-btn" class="danger">Clear</button>
      </div>
    </div>
    <div id="log" role="log" aria-live="polite" aria-label="Event log"></div>
  </div>
</main>

<footer>
  <select id="url-select" aria-label="Pre-configured or recent stream URL"></select>
  <input id="url-input" type="url" placeholder="https://example.com/stream.mpd"
         aria-label="DASH MPD URL" spellcheck="false" autocomplete="off" />
  <button id="load-btn">Load</button>
</footer>

<script type="module" src="dist/bundle.js"></script>
</body>
</html>
